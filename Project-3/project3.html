<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Media in HTML</title>
</head>

<body>
  <img src="riya.jpg" alt="riya" width="100px" height="100px">
  <br />
  <!-- to visible audio file controls attribute must be written on the basis of controls we can pause play moving forward and backward-->
  <audio src="riya (2).m4a" controls></audio>
  <!-- 2nd method of audio attaching -->
  <br />
  <audio controls>
    <source src="riya (2).m4a">
  </audio>
  <br />
  <video src="video.mp4" height="300px" width="200px" controls></video>
  <br />
  <!-- 2nd method -->
  <video controls height="100px" width="200px">
    <source src="video.mp4" type="video/mp4">
  </video>
  <br />
  <br />
  <!-- now we are going to learn about iframe -->
  <!-- apne document mein kisi aur document ko dikhaya hai. -->
  <iframe src="../lecture08/index02.html" width="200px" height="200px"></iframe>
  <iframe src="https://www.youtube.com/embed/Boe7CF-TY_U" width="100px" height="100px"></iframe>

</body>

</html>
